name: Sysdig Pipeline Test

on:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check SECURE_API_TOKEN
        env:
          SECURE_API_TOKEN: ${{ secrets.SECURE_API_TOKEN }}
        run: |
          if [ -z "$SECURE_API_TOKEN" ]; then
            echo "ERROR: SECURE_API_TOKEN is empty or not set"
            exit 1
          else
            echo "SECURE_API_TOKEN is set (length: ${#SECURE_API_TOKEN})"
          fi

      - name: Download Sysdig CLI Scanner (Latest)
        run: |
          curl -LO "https://download.sysdig.com/scanning/bin/sysdig-cli-scanner/$(curl -L -s https://download.sysdig.com/scanning/sysdig-cli-scanner/latest_version.txt)/linux/amd64/sysdig-cli-scanner"
          chmod +x sysdig-cli-scanner

      - name: Run Sysdig Scan
        env:
          SECURE_API_TOKEN: ${{ secrets.SECURE_API_TOKEN }}
        run: |
          ./sysdig-cli-scanner \
            --apiurl https://secure.sysdig.com \
            quay.io/scsk_ecchuuya/sysdigtest:v4

      - name: Show scan logs
        if: always()
        run: |
          echo "===== scan-logs ====="
          cat /home/runner/work/sysdig-pipeline-test/sysdig-pipeline-test/scan-logs || echo "scan-logs not found"
