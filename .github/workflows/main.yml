name: Sysdig Pipeline Test

on:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test connectivity to Sysdig Secure
        run: |
          echo "===== Testing connectivity to Sysdig Secure ====="
          curl -v https://secure.sysdig.com 2>&1 | tee curl-test.log

      - name: Download Sysdig CLI Scanner (Sysdig CDN)
        run: |
          curl -sSL -o sysdig-cli-scanner \
            https://download.sysdig.com/scanning/bin/sysdig-cli-scanner/1.5.0/linux/amd64/sysdig-cli-scanner
          chmod +x sysdig-cli-scanner

      - name: Run Sysdig Scan (token direct test)
        run: |
          SECURE_API_TOKEN="f2b400f8-c236-4de6-90dc-cb4b0864a7f7" ./sysdig-cli-scanner \
            --apiurl https://secure.sysdig.com \
            quay.io/scsk_ecchuuya/sysdigtest:v4

      - name: Show scan logs
        if: always()
        run: |
          echo "===== scan-logs ====="
          cat /home/runner/work/sysdig-pipeline-test/sysdig-pipeline-test/scan-logs || echo "scan-logs not found"
